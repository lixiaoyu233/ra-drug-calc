<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="icon" href="icon.svg" type="image/svg+xml">

import pinyinPro from './pinyin-pro.mjs'

<title>风免计算器</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f5f5f7;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",sans-serif;color:#1d1d1f;padding:0 0 90px;-webkit-font-smoothing:antialiased}

/* ====== Segmented Control (Apple style) ====== */
.tab-contents{max-width:480px;margin:0 auto;padding:12px 16px}

/* ====== Cards (Apple style) ====== */
.card{background:#fff;border-radius:14px;padding:18px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.04),0 4px 12px rgba(0,0,0,.03)}
.card-hd{font-size:13px;font-weight:600;color:#1d1d1f;margin-bottom:14px;letter-spacing:-.01em}

/* ====== Form Fields ====== */
.ff{margin-bottom:12px}
.ff:last-child{margin-bottom:0}
.ff-lbl{display:block;font-size:12px;font-weight:500;color:#86868b;margin-bottom:5px;letter-spacing:-.01em}
.ff-val{display:block;font-size:16px;color:#1d1d1f;font-weight:500;padding:0 2px}
.ff-trigger,.ff-ipt{display:block;width:100%;height:40px;line-height:40px;padding:0 14px;font-size:15px;background:#f5f5f7;border:none;border-radius:10px;outline:none;color:#1d1d1f;-webkit-appearance:none;appearance:none;cursor:pointer}
.ff-trigger{color:#007AFF}
.ff-ipt{text-align:right}
.ff-ipt::-webkit-inner-spin-button{-webkit-appearance:none}
.ff-row{display:flex;gap:10px}
.ff-row .ff{flex:1;min-width:0}
.ff-hint{font-size:12px;color:#86868b;line-height:1.4;margin-top:4px}
select.ff-trigger{color:#1d1d1f}
select.ff-trigger:invalid{color:#c7c7cc}

/* ====== Buttons (Apple style, pill-shaped) ====== */
.btn{height:44px;border-radius:22px;font-size:15px;font-weight:500;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0 28px;transition:all .2s}
.btn-primary{background:linear-gradient(180deg,#007AFF,#0066d6);color:#fff;box-shadow:0 2px 8px rgba(0,122,255,.3)}
.card .btn{width:100%}
.btn-row{display:flex;gap:10px;margin:6px 0}
.btn-row .btn{flex:1;width:auto}
.btn-row .btn-primary{flex:1;width:auto}
.btn-primary:active{transform:scale(.97);box-shadow:0 1px 4px rgba(0,122,255,.2)}
.btn-secondary{background:#f5f5f7;color:#007AFF}
.btn-secondary:active{background:#e8e8ed;transform:scale(.97)}
.btn-small{height:34px;border-radius:17px;font-size:13px;font-weight:500;background:#f5f5f7;color:#007AFF;border:none;cursor:pointer;padding:0 14px;display:inline-flex;align-items:center;justify-content:center;transition:all .2s}
.btn-small:active{background:#e8e8ed}
.btn-add{background:none;border:1.5px dashed #c7c7cc;color:#007AFF;height:40px;border-radius:20px;width:100%;font-size:14px;cursor:pointer;margin-bottom:10px;display:flex;align-items:center;justify-content:center;gap:4px;transition:all .2s}
.btn-add:active{background:#f5f5f7}
.btn-del{font-size:13px;color:#ff3b30;cursor:pointer;padding:4px 8px;border-radius:6px}
.btn-del:active{background:#fff2f0}

/* ====== Prescription List ====== */
.empty{text-align:center;padding:20px 0 10px;font-size:14px;color:#c7c7cc}
.presc-card{background:#f9f9fb;border-radius:12px;padding:12px 14px;margin-bottom:8px}
.presc-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.presc-title{font-size:14px;font-weight:600;color:#1d1d1f;word-break:break-all}
.presc-body{font-size:13px;color:#86868b;line-height:1.5}

/* ====== Result Cards ====== */
.result{border-radius:14px;padding:18px;margin-bottom:12px;background:linear-gradient(135deg,#f8faff,#f0f6ff);box-shadow:0 1px 3px rgba(0,0,0,.04),0 4px 12px rgba(0,0,0,.03)}
.result.warn{background:linear-gradient(135deg,#fffbf5,#fff8e1)}
.result .rc-title{font-size:15px;font-weight:600;color:#1d1d1f;margin-bottom:10px}
.rc-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0}
.rc-row+.rc-row{border-top:0.5px solid rgba(0,0,0,.04)}
.rc-row .rc-lbl{font-size:14px;color:#86868b}
.rc-row .rc-val{font-size:15px;font-weight:600;color:#1d1d1f}
.rc-row .rc-val.blue{color:#007AFF;font-size:16px}
.rc-row .rc-val.red{color:#ff3b30}
.rc-row .rc-val.green{color:#34c759}
.rc-row .rc-val.orange{color:#ff9500}
.rc-div{height:0.5px;background:rgba(0,0,0,.06);margin:8px 0}
.rc-text{font-size:13px;color:#515154;line-height:1.7;white-space:pre-wrap;padding:10px 12px;background:rgba(0,0,0,.03);border-radius:10px;font-family:SFMono-Regular,Menlo,monospace}

/* ====== Gap Analysis ====== */
.gap-item{display:flex;align-items:center;gap:6px;padding:4px 0;white-space:nowrap;font-size:11px}
.gap-badge{background:#fff2f0;color:#ff3b30;font-size:10px;font-weight:600;padding:1px 6px;border-radius:3px;flex-shrink:0}
.gap-text{font-size:11px;color:#515154;overflow:hidden;text-overflow:ellipsis}
.gap-arrow{color:#c7c7cc;font-size:11px;flex-shrink:0}
.gap-total{text-align:center;padding:8px 0 4px;font-size:14px;color:#515154}
.gap-total .num{color:#ff3b30;font-weight:700;font-size:18px}
.gap-none{text-align:center;padding:14px 0;font-size:15px;color:#34c759;font-weight:500}

/* ====== Timeline ====== */
.tl-item{display:flex;align-items:flex-start;padding:4px 0;position:relative}
.tl-line{width:2px;background:#34c759;position:absolute;left:5px;top:14px;bottom:0}
.tl-line.gap{background:#ff9500}
.tl-item:last-child .tl-line{height:0}
.tl-dot{width:12px;height:12px;border-radius:50%;background:#007AFF;flex-shrink:0;margin-top:3px;z-index:1}
.tl-text{flex:1;margin-left:12px;display:flex;align-items:center;gap:3px}
.tl-date{font-size:11px;color:#1d1d1f;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tl-days{font-size:10px;color:#86868b;flex-shrink:0;white-space:nowrap;margin-left:auto}
.tl-cum{font-size:10px;color:#007AFF;flex-shrink:0;white-space:nowrap;margin-left:3px;margin-top:0}

/* ====== Summary Box ====== */
.summary-box{background:#f8faff;border-radius:12px;padding:14px;margin-top:12px}
.sm-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:13px}
.sm-row .sm-lbl{color:#86868b}
.sm-row .sm-val{font-weight:600;color:#1d1d1f}
.sm-row .sm-val.blue{color:#007AFF}
.sm-row .sm-val.red{color:#ff3b30}
.sm-row .sm-val.green{color:#34c759}
.sm-row .sm-val.orange{color:#ff9500}
.sm-div{height:0.5px;background:rgba(0,0,0,.06);margin:6px 0}

/* ====== Date Tools Result ====== */
.result-box{margin-top:10px;padding:16px;background:#f5f5f7;border-radius:12px;text-align:center}
.result-box .num{display:block;font-size:28px;font-weight:700;color:#007AFF;margin:4px 0;letter-spacing:-.02em}
.result-box .sub{display:block;font-size:12px;color:#86868b;margin-top:2px}

/* ====== Misc ====== */
.hide{display:none!important}
.footer{text-align:center;font-size:12px;color:#c7c7cc;padding:20px 0 8px;max-width:480px;margin:0 auto}

/* ====== Bottom Navigation ====== */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;display:flex;background:rgba(250,250,252,.98);border-top:0.5px solid rgba(0,0,0,.1);padding:6px 0 20px;z-index:100;justify-content:center}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:2px 0;cursor:pointer;max-width:120px}
.nav-svg{width:24px;height:24px;color:#86868b}
.nav-label{font-size:11px;color:#86868b;font-weight:500;margin-top:1px}
.nav-item.active .nav-svg{color:#007AFF}
.nav-item.active .nav-label{color:#007AFF}

/* ====== Record Cards ====== */
#recordsList .rec-card{background:#f9f9fb;border-radius:12px;padding:12px 14px;margin-bottom:10px}
#recordsList .rec-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
#recordsList .rec-abbr{font-size:16px;font-weight:700;color:#007AFF;letter-spacing:1px}
#recordsList .rec-actions{display:flex;gap:8px}
#recordsList .rec-btn{font-size:13px;padding:4px 8px;border-radius:6px;cursor:pointer}
#recordsList .rec-btn.edit{color:#007AFF}
#recordsList .rec-btn.del{color:#FF3B30}
#recordsList .rec-body{display:flex;flex-direction:column;gap:2px;margin-bottom:6px}
#recordsList .rec-info{font-size:12px;color:#86868b;line-height:1.4}
#recordsList .rec-foot{display:flex;justify-content:space-between;align-items:center;padding-top:8px;border-top:0.5px solid rgba(0,0,0,.04)}
#recordsList .rec-days{font-size:14px;font-weight:600;color:#1d1d1f;line-height:20px}
#recordsList .rec-days.warn{color:#FF3B30}
#recordsList .rec-badge{font-size:14px;color:#FF3B30;background:none;padding:0;border-radius:0;line-height:20px}
.save-btn{margin-top:10px}
#recordsList .empty{text-align:center;padding:20px 0 10px;font-size:14px;color:#c7c7cc}
/* ====== Save Dialog ====== */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:200}
.modal-box{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:280px;background:#fff;border-radius:14px;z-index:201;overflow:hidden}
.modal-hd{text-align:center;font-size:16px;font-weight:600;color:#1d1d1f;padding:16px 16px 0}
.modal-body{padding:16px}
.modal-lbl{display:block;font-size:13px;color:#86868b;margin-bottom:6px}
.modal-ipt{display:block;width:100%;height:40px;line-height:40px;padding:0 12px;font-size:20px;font-weight:700;text-align:center;letter-spacing:3px;background:#f5f5f7;border:none;border-radius:10px;outline:none;color:#1d1d1f;text-transform:uppercase;box-sizing:border-box}
.modal-err{display:block;font-size:12px;color:#FF3B30;margin-top:4px;text-align:center}
.modal-btns{display:flex;border-top:0.5px solid rgba(0,0,0,.06)}
.modal-btn{flex:1;text-align:center;padding:14px 0;font-size:15px;cursor:pointer;border:none;background:none}
.modal-btn.cancel{color:#86868b}
.modal-btn.confirm{color:#007AFF;font-weight:600}

@media (prefers-color-scheme:dark){
body{background:#1C1C1E;color:#F5F5F7}
.card{background:#2C2C2E;box-shadow:none}
.card-hd{color:#98989D}
.ff-lbl,.ff-hint,.rc-lbl,.sm-lbl,.gap-text,.gap-arrow,.gap-total,.rb-label,.empty{color:#98989D}
.ff-val,.rc-val,.sm-val,.presc-title,.rc-title,.tl-date,.gap-total{color:#F5F5F7}
.ff-trigger,.ff-ipt{background:#3A3A3C;color:#F5F5F7}
.ff-trigger{color:#0A84FF}
.ff-ipt{color:#F5F5F7}
select.ff-trigger{color:#F5F5F7}
select.ff-trigger:invalid{color:#48484A}
.presc-card,.rc-text{background:#3A3A3C}
.presc-body{color:#98989D}
.result{background:#2C2C2E;box-shadow:none}
.result.warn{background:#3A2E1E}
.rc-row+.rc-row,.rc-div,.sm-div{border-color:#38383A}
.gap-badge{background:#4A2020;color:#FF453A}
.gap-none{color:#30D158}
.gap-num{color:#FF453A}
.tl-line{background:#30D158}
.tl-line.gap{background:#FF9F0A}
.tl-dot{background:#0A84FF}
.tl-cum{color:#0A84FF}
.tl-days{color:#98989D}
.summary-box{background:#3A3A3C}
.sm-val.blue,.rc-val.blue{color:#0A84FF}
.rc-val.red,.sm-val.red{color:#FF453A}
.rc-val.green,.sm-val.green{color:#30D158}
.rc-val.orange,.sm-val.orange{color:#FF9F0A}
.result-box{background:#3A3A3C}
.result-box .num{color:#0A84FF}
.result-box .sub{color:#98989D}
.btn-secondary,.btn-small{background:#3A3A3C;color:#0A84FF}
.btn-add{border-color:#48484A;color:#0A84FF}
.btn-del{color:#FF453A}
.footer{color:#48484A}
.bottom-nav{background:rgba(28,28,30,.98);border-color:#38383A}
.nav-svg{color:#98989D}
.nav-label{color:#98989D}
.nav-item.active .nav-svg{color:#0A84FF}
.nav-item.active .nav-label{color:#0A84FF}
#recordsList .rec-card{background:#3A3A3C}
#recordsList .rec-abbr{color:#0A84FF}
#recordsList .rec-info{color:#98989D}
#recordsList .rec-days{color:#F5F5F7}
#recordsList .rec-days.warn{color:#FF453A}
#recordsList .rec-badge{color:#FF453A}
#recordsList .rec-foot{border-color:#38383A}
#recordsList .rec-btn.edit{color:#0A84FF}
#recordsList .rec-btn.del{color:#FF453A}
#recordsList .empty{color:#48484A}
.modal-box{background:#2C2C2E}
.modal-hd{color:#F5F5F7}
.modal-lbl{color:#98989D}
.modal-ipt{background:#3A3A3C;color:#F5F5F7}
.modal-btn.cancel{color:#98989D}
.modal-btn.confirm{color:#0A84FF}
.modal-btns{border-color:#38383A}
}
</style>
</head>
<body>

<div class="tab-contents">

<!-- Tab 0: 处方 -->
<div id="tab0" class="tab-content">

  <div class="card">
    <div class="card-hd">选择药物</div>
    <div class="ff">
      <label class="ff-lbl">分类</label>
      <select class="ff-trigger" id="catSelect" onchange="onCatChange()"><option value="">请选择</option></select>
    </div>
    <div class="ff">
      <label class="ff-lbl">药物</label>
      <select class="ff-trigger" id="drugSelect" onchange="onDrugChange()"><option value="">请先选分类</option></select>
    </div>
    <div class="ff-hint" id="drugNote"></div>
  </div>

  <div class="card hide" id="prescForm">
    <div class="card-hd">处方信息</div>
    <div class="ff">
      <label class="ff-lbl">药品</label>
      <div class="ff-val" id="medName"></div>
    </div>
    <div class="ff">
      <label class="ff-lbl">开药日期</label>
      <input class="ff-trigger" type="date" id="prescDate">
    </div>
    <div class="ff">
      <label class="ff-lbl">每次用量</label>
      <input class="ff-ipt" type="number" id="dosePerTime" placeholder="如 1" min="0" step="any">
    </div>
    <div class="ff">
      <label class="ff-lbl">用药频次</label>
      <select class="ff-trigger" id="freqSelect"></select>
    </div>
    <div class="ff">
      <label class="ff-lbl">开药总量</label>
      <input class="ff-ipt" type="number" id="totalQty" placeholder="如 60" min="0" step="any">
    </div>
  </div>

  <div class="btn-row hide" id="actionBtns">
    <button class="btn btn-primary" type="button" onclick="calcOnce()">计算单次</button>
    <button class="btn btn-secondary" type="button" onclick="resetForm()">清空</button>
  </div>

  <div class="card result hide" id="singleResult">
    <div class="rc-title">计算结果</div>
    <div class="rc-row"><span class="rc-lbl">每天用量</span><span class="rc-val" id="rDailyDose"></span></div>
    <div class="rc-row"><span class="rc-lbl">可服用天数</span><span class="rc-val blue" id="rDaysSupply"></span></div>
    <div class="rc-row"><span class="rc-lbl">预计用完日期</span><span class="rc-val blue" id="rEndDate"></span></div>
    <div class="rc-div"></div>
    <div class="rc-text" id="rText"></div>
  </div>

  <div class="card hide" id="multiSection">
    <div class="card-hd">多次处方列表</div>
    <button class="btn-add" type="button" onclick="addPresc()">+ 添加此处方到列表</button>
    <div class="empty" id="listEmpty">暂无处方记录</div>
    <div id="prescList"></div>
    <div class="btn-row hide" id="gapBtns">
      <button class="btn btn-primary" type="button" onclick="analyze()">分析断药</button>
      <button class="btn btn-secondary" type="button" onclick="clearList()">清空列表</button>
    </div>
  </div>

  <div class="card result warn hide" id="gapResult">
    <div class="rc-title">断药分析</div>
    <div id="gapBody"></div>
  </div>

  <button class="btn btn-primary save-btn hide" type="button" id="saveBtn" onclick="showSaveDialog()">保存记录</button>

</div>

<!-- Tab 1: 日期工具 -->
<div id="tab1" class="tab-content hide">
  <div class="card">
    <div class="card-hd">计算日期差</div>
    <div class="ff">
      <label class="ff-lbl">开始日期</label>
      <input class="ff-trigger" type="date" id="d1">
    </div>
    <div class="ff">
      <label class="ff-lbl">结束日期</label>
      <input class="ff-trigger" type="date" id="d2">
    </div>
    <button class="btn btn-primary" type="button" onclick="calcDiff()">计算相差天数</button>
    <div class="result-box hide" id="diffResult">
      <span>相差</span><span class="num" id="diffNum">0</span><span>天</span>
      <span class="sub" id="diffSub"></span>
    </div>
  </div>
  <div class="card">
    <div class="card-hd">推算日期</div>
    <div class="ff">
      <label class="ff-lbl">起始日期</label>
      <input class="ff-trigger" type="date" id="offsetBase">
    </div>
    <div class="ff-row">
      <div class="ff">
        <label class="ff-lbl">数值</label>
        <input class="ff-ipt" type="number" id="offsetVal" placeholder="如 30" min="0" step="any">
      </div>
      <div class="ff">
        <label class="ff-lbl">单位</label>
        <select class="ff-trigger" id="offsetUnit"><option value="天">天</option><option value="周">周</option><option value="月">月</option></select>
      </div>
    </div>
    <div class="ff-row">
      <div class="ff">
        <label class="ff-lbl">方向</label>
        <select class="ff-trigger" id="offsetDir"><option value="1">往后</option><option value="-1">往前</option></select>
      </div>
      <div class="ff">
        <label class="ff-lbl">&nbsp;</label>
        <button class="btn btn-primary" type="button" onclick="calcOffset()">推算</button>
      </div>
    </div>
    <div class="result-box hide" id="offsetResult">
      <span class="num" id="offsetNum"></span>
    </div>
  </div>
  </div>

<!-- Tab 2: 保存记录 -->
<div id="tab2" class="tab-content hide">
  <div class="card">
    <div class="card-hd">保存的记录</div>
    <div id="recordsList"></div>
  </div>
</div>

</div>

<div class="footer">本工具仅供参考，实际用药请遵医嘱</div>

<div class="bottom-nav">
  <div class="nav-item active" data-tab="0" onclick="switchTab(0)">
    <svg viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" class="nav-svg"><rect x="7" y="6" width="8" height="12" rx="2"/><rect x="9" y="3" width="4" height="3" rx=".5"/></svg>
    <span class="nav-label">处方计算</span>
  </div>
  <div class="nav-item" data-tab="1" onclick="switchTab(1)">
    <svg viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" class="nav-svg"><rect x="3" y="5" width="16" height="14" rx="2"/><path d="M7 2v4M15 2v4M3 9h16"/></svg>
    <span class="nav-label">日期工具</span>
  </div>
  <div class="nav-item" data-tab="2" onclick="switchTab(2)">
    <svg viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" class="nav-svg"><line x1="4" y1="6" x2="18" y2="6"/><line x1="4" y1="11" x2="18" y2="11"/><line x1="4" y1="16" x2="18" y2="16"/></svg>
    <span class="nav-label">记录</span>
  </div>
</div>

<div class="modal-overlay hide" id="saveOverlay" onclick="cancelSave()"></div>
<div class="modal-box hide" id="saveDialog">
  <div class="modal-hd" id="saveDialogTitle">保存记录</div>
  <div class="modal-body">
    <label class="modal-lbl">输入缩写（4位字母）</label>
    <input class="modal-ipt" id="saveAbbrInput" placeholder="如 MTX1" oninput="onSaveAbbrInput(this)" autofocus/>
    <span class="modal-err hide" id="saveAbbrError"></span>
  </div>
  <div class="modal-btns">
    <button class="modal-btn cancel" type="button" onclick="cancelSave()">取消</button>
    <button class="modal-btn confirm" type="button" onclick="confirmSave()">确认</button>
  </div>
</div>

<script>
// ==== Data ====
const STORAGE_KEY = 'calc_records'

// ==== State ====
let state={drugByCat:{},medName:'',freq:'QD',unit:'片',prescList:[],idCounter:0,editRecordId:null}

function buildDrugIndex(){
  const by={};for(const[n,i]of Object.entries(drugDB)){if(!by[i.cat])by[i.cat]=[];by[i.cat].push(n)}
  state.drugByCat=by
}

// ==== Init ====
function init(){
  buildDrugIndex()
  const catSel=document.getElementById('catSelect')
  catSel.innerHTML='<option value="">请选择分类</option>'+catOrder.map(c=>`<option value="${c}">${catLabel[c]}</option>`).join('')
  document.getElementById('prescDate').value=todayStr()
  document.getElementById('d1').value=todayStr()
  document.getElementById('d2').value=todayStr()
  document.getElementById('offsetBase').value=todayStr()
  const fs=document.getElementById('freqSelect')
  fs.innerHTML=freqOpts.map((f,i)=>`<option value="${f.val}" ${i===0?'selected':''}>${f.label}</option>`).join('')
}
init()
loadRecords()

// ==== Tab ====
function switchTab(n){
  document.querySelectorAll('.nav-item').forEach((t,i)=>t.classList.toggle('active',i===n))
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.toggle('hide',c.id!=='tab'+n))
}

// ==== Drug selection ====
function onCatChange(){
  const cat=document.getElementById('catSelect').value
  const ds=document.getElementById('drugSelect')
  if(!cat||!state.drugByCat[cat]){ds.innerHTML='<option value="">请先选分类</option>';ds.disabled=1;return}
  ds.disabled=0
  ds.innerHTML='<option value="">请选择药物</option>'+state.drugByCat[cat].map(d=>`<option value="${d}">${d}</option>`).join('')
}

function onDrugChange(){
  const name=document.getElementById('drugSelect').value
  if(!name){hideForm();return}
  const info=drugDB[name]
  const hasDiff=state.prescList.some(p=>p.medName!==name)
  if(hasDiff&&state.prescList.length>0){state.prescList=[];state.idCounter=0;renderList();hideGap();alert('已切换药物，处方列表已清空')}
  state.medName=name;state.unit=info.unit;state.freq=info.freq
  document.getElementById('medName').textContent=name
  document.getElementById('dosePerTime').value=info.dose
  document.getElementById('freqSelect').value=info.freq
  document.getElementById('drugNote').textContent=info.note||''
  document.getElementById('prescForm').classList.remove('hide')
  document.getElementById('actionBtns').classList.remove('hide')
  document.getElementById('multiSection').classList.remove('hide')
  hideSingleResult()
}

function hideForm(){
  document.getElementById('prescForm').classList.add('hide')
  document.getElementById('actionBtns').classList.add('hide')
}

// ==== Single calc ====
function calcOnce(){
  const d=readForm()
  if(!d.medName||!d.dose||!d.qty){alert('请填写完整信息');return}
  const dose=+d.dose,qty=+d.qty;if(isNaN(dose)||isNaN(qty)||dose<=0||qty<=0){alert('用量请输入有效数字');return}
  const {ds,dd}=calcSupply(qty,d.dose,d.freq)
  if(ds<=0){alert('药量不足以服用1天');return}
  const start=parseDate(d.date||todayStr()),end=addDays(start,ds-1),es=fmtDate(end)
  let txt=dd.toFixed(2)+d.unit
  const info=drugDB[d.medName]
  if(info){const s=info.spec; const m=s.match(/([\d.]+)mg/),g=s.match(/([\d.]+)g/);if(m)txt+=`（${(dd*+m[1]).toFixed(1)}mg）`;else if(g)txt+=`（${(dd*+g[1]*1000).toFixed(0)}mg）`}
  const rText=`💊 ${d.medName}\n📋 用法：${d.dose}${d.unit}/次 ${freqOpts.find(f=>f.val===d.freq)?.label||d.freq}\n📦 总量：${d.qty}${d.unit}\n📅 开药：${d.date||todayStr()}\n━━━━\n📌 每天：${txt}\n📌 可服：${ds}天\n📌 用完：${es}`
  document.getElementById('rDailyDose').textContent=txt
  document.getElementById('rDaysSupply').textContent=ds+' 天'
  document.getElementById('rEndDate').textContent=es
  document.getElementById('rText').textContent=rText
  document.getElementById('singleResult').classList.remove('hide')
}

function hideSingleResult(){document.getElementById('singleResult').classList.add('hide')}

function readForm(){
  return{
    medName:state.medName,
    date:document.getElementById('prescDate').value,
    dose:document.getElementById('dosePerTime').value,
    freq:document.getElementById('freqSelect').value,
    qty:document.getElementById('totalQty').value,
    unit:state.unit
  }
}

function resetForm(){
  document.getElementById('dosePerTime').value=''
  document.getElementById('totalQty').value=''
  hideSingleResult()
}

// ==== Multi presc list ====
function addPresc(){
  const d=readForm()
  if(!d.medName||!d.dose||!d.qty){alert('请先选择药物并填写信息');return}
  const dose=+d.dose,qty=+d.qty
  if(isNaN(dose)||dose<=0){alert('每次用量请输入有效数字');return}
  if(isNaN(qty)||qty<=0){alert('总量请输入有效数字');return}
  const date=d.date||todayStr()
  const {ds,dd}=calcSupply(qty,d.dose,d.freq)
  if(ds<=0){alert('药量不足以服用1天');return}
  const start=parseDate(date),end=addDays(start,ds-1)
  state.idCounter++
  state.prescList.push({id:state.idCounter,medName:d.medName,prescDate:date,dosePerTime:d.dose,doseUnit:d.unit,freqLabel:freqOpts.find(f=>f.val===d.freq)?.label||d.freq,totalQty:d.qty,dailyDose:dd,daysSupply:ds,endDate:fmtDate(end),unit:d.unit,freqVal:d.freq})
  renderList()
  hideGap()
}

function renderList(){
  const el=document.getElementById('prescList'),empty=document.getElementById('listEmpty'),btns=document.getElementById('gapBtns')
  if(!state.prescList.length){el.innerHTML='';empty.classList.remove('hide');btns.classList.add('hide');return}
  empty.classList.add('hide')
  el.innerHTML=state.prescList.map((p,i)=>`<div class="presc-card"><div class="presc-head"><span class="presc-title">第${i+1}次 · ${p.medName}</span><span class="btn-del" onclick="delPresc(${p.id})">删除</span></div><div class="presc-body">开药：${p.prescDate} ｜ 用法：${p.dosePerTime}${p.unit}/次 ${p.freqLabel}<br>总量：${p.totalQty}${p.unit} ｜ 预计用完：${p.endDate}（${p.daysSupply}天）</div></div>`).join('')
  btns.classList.toggle('hide',state.prescList.length<2)
}

function delPresc(id){state.prescList=state.prescList.filter(p=>p.id!==id);renderList();hideGap()}
function clearList(){state.prescList=[];state.idCounter=0;state.editRecordId=null;renderList();hideGap()}
function hideGap(){document.getElementById('gapResult').classList.add('hide');document.getElementById('saveBtn').classList.add('hide')}

// ==== Analyze gaps ====
function analyze(){
  const list=state.prescList
  if(list.length<2){alert('请至少添加 2 次处方');return}
  const sorted=[...list].sort((a,b)=>a.prescDate.localeCompare(b.prescDate))
  let pills=+sorted[0].totalQty,dose=sorted[0].dailyDose,last=parseDate(sorted[0].prescDate)
  const gaps=[],entries=[]
  let totalGap=0
  const fe=addDays(last,Math.floor(pills/dose)-1)
  entries.push({...sorted[0],cumEnd:fmtDate(fe),hasGapBefore:false,showCum:fmtDate(fe)!==sorted[0].endDate})
  for(let i=1;i<sorted.length;i++){
    const p=sorted[i],cd=parseDate(p.prescDate),elapsed=diffDays(last,cd),need=elapsed*dose
    let hasGap=false
    if(need>pills){
      const short=need-pills,gap=Math.ceil(short/dose)
      totalGap+=gap
      const ro=addDays(last,Math.floor(pills/dose)-1)
      gaps.push({index:i,fromDate:fmtDate(ro),toDate:p.prescDate,gapDays:gap,fromLabel:'药吃完（'+fmtDate(ro)+'）',toLabel:'下次开药（'+p.prescDate+'）'})
      pills=0;hasGap=true
    }else{pills-=need}
    pills+=+p.totalQty;dose=p.dailyDose;last=cd
    const ce=addDays(last,Math.floor(pills/dose)-1),ces=fmtDate(ce)
    entries.push({...p,cumEnd:ces,hasGapBefore:hasGap,showCum:ces!==p.endDate})
  }
  const finalDate=entries[entries.length-1].cumEnd,finalEnd=parseDate(finalDate)
  const continuousStart=entries.reduce((s,e)=>e.hasGapBefore?e.prescDate:s,entries[0].prescDate)
  const contDays=Math.max(0,diffDays(parseDate(continuousStart),new Date()))
  const contM=Math.floor(contDays/30),contD=contDays%30
  const target=90,tRemain=Math.max(0,target-contDays),contMet=contDays>=target
  const latest = sorted[sorted.length - 1]
  const pillsNeeded = contMet ? 0 : calcPillsNeeded(tRemain, latest.freqVal, latest.dosePerTime, latest.dailyDose)
  const suggestDate=addDays(finalEnd,-7),suggestStr=fmtDate(suggestDate)
  const remainDays=diffDays(new Date(),finalEnd),urgent=suggestStr<=todayStr()
  const gapSet=new Set(gaps.map(g=>g.index))

  let html='<span style="font-size:12px;color:#636366">共 '+list.length+' 次处方</span>'
  if(!gaps.length)html+='<div class="gap-none">✅ 连续用药，无断药</div>'
  else{
    html+=gaps.map(g=>`<div class="gap-item"><span class="gap-badge">${g.gapDays}天断药</span><span class="gap-text">${g.fromLabel}</span><span class="gap-arrow">→</span><span class="gap-text">${g.toLabel}</span></div>`).join('')
    html+=`<div class="gap-total">累计断药：<span class="num">${totalGap} 天</span></div>`
  }
  html+='<div class="gap-timeline">'+entries.map((e,i)=>`<div class="tl-item"><div class="tl-line${e.hasGapBefore?' gap':''}"></div><div class="tl-dot"></div><div class="tl-text"><div class="tl-date">第${i+1}次：${e.prescDate} → ${e.endDate}</div><span class="tl-days">${e.daysSupply}天</span>${e.showCum?'<span class="tl-cum">累计可到 '+e.cumEnd+'</span>':''}</div></div>`).join('')+'</div>'
  html+='<div class="summary-box">'
  html+=`<div class="sm-row"><span class="sm-lbl">连续未断药（至今）</span><span class="sm-val blue">${contM}月${contD}天</span></div>`
  html+=`<div class="sm-row"><span class="sm-lbl">项目要求（3个月）</span><span class="sm-val ${contMet?'green':'orange'}">${contMet?'✅ 已达标':'还差 '+tRemain+' 天'}</span></div>`
  html+=`<div class="sm-div"></div>`
  html+=`<div class="sm-row"><span class="sm-lbl">全部药可吃到</span><span class="sm-val">${finalDate}</span></div>`
  html+=`<div class="sm-row"><span class="sm-lbl">距离今天</span><span class="sm-val ${remainDays>=0?'blue':'red'}">${remainDays>=0?'还剩 '+remainDays+' 天':'已断药 '+(-remainDays)+' 天'}</span></div>`
  html+=`<div class="sm-row ${contMet?'hide':''}" id="pillsNeededRow"><span class="sm-lbl">还需购买药物</span><span class="sm-val orange" id="pillsNeededText">${pillsNeeded}${latest.unit||'粒'}</span></div>`
  html+=`<div class="sm-row"><span class="sm-lbl">建议购药时间</span><span class="sm-val ${urgent?'red':'orange'}">${suggestStr}${urgent?' ⚠️ 已过期':''} 前</span></div>`
  html+='</div>'
  document.getElementById('gapBody').innerHTML=html
  document.getElementById('gapResult').classList.remove('hide')
  document.getElementById('saveBtn').classList.remove('hide')
}

// ==== Records ====

function loadRecords() {
  const raw = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]')
  const now = new Date()
  const list = raw.map(r => {
    const det = calcRecordDays(r.prescList)
    return { ...r, ...det, saveDateStr: fmtDate(new Date(r.lastSaved)) }
  })
  list.sort((a, b) => b.lastSaved - a.lastSaved)
  renderRecords(list)
}

function calcRecordDays(prescList) {
  if (!prescList || prescList.length === 0) return { remainingDays: -1 }
  const sorted = [...prescList].sort((a, b) => a.prescDate.localeCompare(b.prescDate))
  let remainPills = +sorted[0].totalQty
  let currentDose = sorted[0].dailyDose
  let lastDate = parseDate(sorted[0].prescDate)
  const entries = []
  const firstCumEndStr = fmtDate(addDays(lastDate, Math.floor(remainPills / currentDose) - 1))
  entries.push({ prescDate: sorted[0].prescDate, cumEnd: firstCumEndStr, hasGapBefore: false })
  for (let i = 1; i < sorted.length; i++) {
    const p = sorted[i], cd = parseDate(p.prescDate), elapsed = diffDays(lastDate, cd), need = elapsed * currentDose
    let hasGap = false
    if (need > remainPills) { remainPills = 0; hasGap = true } else { remainPills -= need }
    remainPills += +p.totalQty; currentDose = p.dailyDose; lastDate = cd
    const ce = fmtDate(addDays(lastDate, Math.floor(remainPills / currentDose) - 1))
    entries.push({ prescDate: p.prescDate, cumEnd: ce, hasGapBefore: hasGap })
  }
  const finalDate = entries[entries.length - 1].cumEnd
  const finalEnd = parseDate(finalDate)
  const remainingDays = Math.max(0, diffDays(new Date(), finalEnd))
  let contStart = entries[0].prescDate
  for (const e of entries) { if (e.hasGapBefore) contStart = e.prescDate }
  const contTotalDays = Math.max(0, diffDays(parseDate(contStart), new Date()))
  const target = 90
  const targetRemain = Math.max(0, target - contTotalDays)
  const contMet = contTotalDays >= target
  const pillsNeeded = contMet ? 0 : calcPillsNeeded(targetRemain, sorted[sorted.length-1].freqVal, sorted[sorted.length-1].dosePerTime, currentDose)
  return { remainingDays, endDate: finalDate, contDays: contTotalDays, contMet, targetRemain, pillsNeeded, unit: sorted[sorted.length - 1]?.unit || '粒' }
}

function renderRecords(list) {
  const el = document.getElementById('recordsList')
  if (!list.length) { el.innerHTML = '<div class="empty">暂无保存记录</div>'; return }
  el.innerHTML = list.map(r => `<div class="rec-card">
    <div class="rec-head"><span class="rec-abbr">${r.abbr}</span>
      <div class="rec-actions"><span class="rec-btn edit" onclick="editRecord(${r.id})">编辑</span><span class="rec-btn del" onclick="deleteRecord(${r.id})">删除</span></div>
    </div>
    <div class="rec-body"><span class="rec-info">${r.medName} ｜ ${r.prescList.length}次处方</span><span class="rec-info">保存于 ${r.saveDateStr}</span><span class="rec-info">用完时间：${r.endDate}</span><span class="rec-info">连续未断药：${r.contDays}天</span><span class="rec-info">${r.contMet ? '项目要求（3个月）：✅ 已达标' : '项目要求（3个月）：还需'+r.targetRemain+'天'}</span>${r.contMet ? '' : '<span class="rec-info">还需购买药物：'+r.pillsNeeded+r.unit+'</span>'}</div>
    <div class="rec-foot"><span class="rec-days ${r.remainingDays>=0 && r.remainingDays<=7?'warn':''}">${r.remainingDays>=0?'剩余 '+r.remainingDays+' 天没药':'已过期'}</span>${r.contMet?'':'<span class="rec-badge">建议购买 '+r.pillsNeeded+r.unit+' 药物</span>'}</div>
  </div>`).join('')
}

function showSaveDialog() {
  if (state.prescList.length === 0) { alert('暂无处方记录可保存'); return }
  const editId = state.editRecordId
  let abbr = ''
  if (editId) {
    const records = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]')
    const rec = records.find(r => r.id === editId)
    if (rec) abbr = rec.abbr
  }
  document.getElementById('saveAbbrInput').value = abbr
  document.getElementById('saveAbbrError').classList.add('hide')
  document.getElementById('saveDialogTitle').textContent = editId ? '更新记录' : '保存记录'
  document.getElementById('saveOverlay').classList.remove('hide')
  document.getElementById('saveDialog').classList.remove('hide')
  document.getElementById('saveAbbrInput').focus()
}

function onSaveAbbrInput(input) {
  input.value = input.value.slice(0, 20)
}

function abbrFromChinese(v) {
  if (!/[\u4e00-\u9fff]/.test(v)) return v.replace(/[^a-zA-Z0-9]/g, '').slice(0, 4).toUpperCase()
  if (!window.py) return v.slice(0, 4).toUpperCase()
  const arr = window.py.pinyin(v, { toneType: 'none', type: 'array' })
  const n = arr.length
  if (n >= 4) return arr.slice(0, 4).map(s => s[0].toUpperCase()).join('')
  if (n === 3) return (arr[0][0] + arr[1][0] + arr[2].slice(0, 2)).toUpperCase()
  if (n === 2) return (arr[0].slice(0, 2) + arr[1].slice(0, 2)).toUpperCase()
  return arr[0].slice(0, 4).toUpperCase()
}

function confirmSave() {
  try {
    const input = document.getElementById('saveAbbrInput')
    if (!input) { console.error('saveAbbrInput not found'); return }
    const abbr = abbrFromChinese(input.value)
    input.value = abbr
    if (abbr.length !== 4) { document.getElementById('saveAbbrError').textContent = '请输入4位字母或汉字'; document.getElementById('saveAbbrError').classList.remove('hide'); return }
    const editId = state.editRecordId
    if (!state.medName) { alert('请先选择药物'); return }
    const record = {
      id: editId || Date.now(),
      abbr,
      medName: state.medName,
      prescList: state.prescList.map(p => ({...p})),
      drugUnit: state.unit,
      lastSaved: Date.now(),
      dosePerTime: document.getElementById('dosePerTime')?.value || '',
      freqVal: document.getElementById('freqSelect')?.value || ''
    }
    let records = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]')
    const idx = records.findIndex(r => r.id === record.id)
    if (idx >= 0) { records[idx] = record } else { records.push(record) }
    localStorage.setItem(STORAGE_KEY, JSON.stringify(records))
    cancelSave()
    state.editRecordId = null
    loadRecords()
    alert(idx >= 0 ? '已更新' : '已保存')
  } catch(e) { console.error('confirmSave error:', e); alert('保存失败: ' + e.message) }
}

function cancelSave() {
  document.getElementById('saveOverlay').classList.add('hide')
  document.getElementById('saveDialog').classList.add('hide')
}

function deleteRecord(id) {
  if (!confirm('确定删除此记录？')) return
  let records = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]')
  records = records.filter(r => r.id !== id)
  localStorage.setItem(STORAGE_KEY, JSON.stringify(records))
  loadRecords()
}

function editRecord(id) {
  const records = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]')
  const rec = records.find(r => r.id === id)
  if (!rec) { alert('记录不存在'); return }
  state.editRecordId = id
  state.medName = rec.medName
  state.unit = rec.drugUnit
  state.prescList = rec.prescList.map(p => ({...p}))
  document.getElementById('dosePerTime').value = rec.dosePerTime || ''
  document.getElementById('freqSelect').value = rec.freqVal || 'QD'
  document.getElementById('medName').textContent = rec.medName
  document.getElementById('prescForm').classList.remove('hide')
  document.getElementById('actionBtns').classList.remove('hide')
  document.getElementById('multiSection').classList.remove('hide')
  switchTab(0)
  alert('正在编辑 ' + rec.abbr)
}

// ==== Date tools ====
function calcDiff(){
  const d1=document.getElementById('d1').value,d2=document.getElementById('d2').value
  if(!d1||!d2){alert('请选择两个日期');return}
  const diff=diffDays(parseDate(d1),parseDate(d2))
  const [a,b]=diff<0?[d2,d1]:[d1,d2]
  document.getElementById('diffNum').textContent=diff<0?-diff:diff
  document.getElementById('diffSub').textContent=`${a} → ${b}`
  document.getElementById('diffResult').classList.remove('hide')
}
function calcOffset(){
  const base=document.getElementById('offsetBase').value,val=+document.getElementById('offsetVal').value,unit=document.getElementById('offsetUnit').value,dir=+document.getElementById('offsetDir').value
  if(!base||!val){alert('请填写完整');return}
  const d=parseDate(base)
  if(unit==='月'){
    d.setMonth(d.getMonth()+dir*val)
  } else {
    d.setDate(d.getDate()+dir*val*(unit==='周'?7:1))
  }
  document.getElementById('offsetNum').textContent=fmtDate(d)
  document.getElementById('offsetResult').classList.remove('hide')
}
