<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>风免计算器</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#F2F2F7;font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;color:#1C1C1E;padding:12px 14px 90px;max-width:480px;margin:0 auto;min-height:100vh}
.tabs{display:flex;background:#fff;border-radius:8px;overflow:hidden;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.tab{flex:1;text-align:center;padding:10px 0;font-size:14px;font-weight:500;color:#8E8E93;border-bottom:2px solid transparent;cursor:pointer}
.tab.active{color:#007AFF;border-bottom-color:#007AFF;background:#f5f9ff}
.card{background:#fff;border-radius:10px;padding:14px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.card-hd{font-size:12px;font-weight:600;color:#8E8E93;letter-spacing:.5px;margin-bottom:10px}
.ff{margin-bottom:10px}
.ff:last-child{margin-bottom:0}
.ff-lbl{display:block;font-size:12px;color:#8E8E93;margin-bottom:3px}
.ff-val{display:block;font-size:15px;color:#1C1C1E;font-weight:500;padding:0 2px}
.ff-trigger,.ff-ipt{display:block;width:100%;height:36px;line-height:36px;padding:0 10px;font-size:14px;background:#F2F2F7;border:none;border-radius:6px;outline:none;color:#1C1C1E}
.ff-trigger{color:#007AFF}
.ff-ipt{text-align:right}
.ff-ipt::-webkit-inner-spin-button{-webkit-appearance:none}
.ff-row{display:flex;gap:8px}
.ff-row .ff{flex:1}
.ff-hint{font-size:11px;color:#8E8E93;line-height:1.4;margin-top:3px}
select.ff-trigger{-webkit-appearance:none;appearance:none;color:#1C1C1E;cursor:pointer}
select.ff-trigger:invalid{color:#C7C7CC}
.btn-row{display:flex;gap:8px;margin:4px 0 8px}
.btn{flex:1;height:40px;border-radius:8px;font-size:15px;font-weight:500;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center}
.btn-primary{background:#007AFF;color:#fff}
.btn-secondary{background:#F2F2F7;color:#007AFF}
.btn-small{height:32px;border-radius:6px;font-size:13px;background:#F2F2F7;color:#007AFF;border:none;cursor:pointer;padding:0 12px}
.btn-add{background:none;border:1.5px dashed #C7C7CC;color:#007AFF;height:36px;border-radius:8px;width:100%;font-size:14px;cursor:pointer;margin-bottom:8px;display:flex;align-items:center;justify-content:center;gap:4px}
.btn-del{font-size:12px;color:#FF3B30;cursor:pointer;padding:4px 6px}
.empty{text-align:center;padding:16px 0 8px;font-size:13px;color:#C7C7CC}
.presc-card{background:#F9F9FB;border-radius:8px;padding:10px 12px;margin-bottom:6px;border:.5px solid #E5E5EA}
.presc-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.presc-title{font-size:13px;font-weight:600;color:#1C1C1E;word-break:break-all}
.presc-body{font-size:12px;color:#636366;line-height:1.5}
.result{border-left:3px solid #007AFF}
.result.warn{border-left-color:#FF9500}
.result .rc-title{font-size:14px;font-weight:600;margin-bottom:8px}
.rc-row{display:flex;justify-content:space-between;padding:5px 0;font-size:13px}
.rc-row .rc-lbl{color:#636366}
.rc-row .rc-val{font-weight:600;color:#1C1C1E}
.rc-row .rc-val.blue{color:#007AFF;font-size:15px}
.rc-row .rc-val.red{color:#FF3B30}
.rc-row .rc-val.green{color:#34C759}
.rc-row .rc-val.orange{color:#FF9500}
.rc-div{height:.5px;background:#E5E5EA;margin:6px 0}
.rc-text{font-size:12px;color:#3C3C43;line-height:1.6;white-space:pre-wrap;padding:6px 8px;background:#F9F9FB;border-radius:6px;font-family:monospace;margin-bottom:6px}
.gap-item{display:flex;align-items:center;gap:4px;padding:3px 0;white-space:nowrap;font-size:11px}
.gap-badge{background:#FFF2F0;color:#FF3B30;font-size:10px;font-weight:600;padding:1px 6px;border-radius:3px;flex-shrink:0}
.gap-text{font-size:11px;color:#3C3C43;overflow:hidden;text-overflow:ellipsis}
.gap-arrow{color:#C7C7CC;font-size:11px;flex-shrink:0}
.gap-total{text-align:center;padding:6px 0 2px;font-size:13px;color:#3C3C43}
.gap-total .num{color:#FF3B30;font-weight:700;font-size:16px}
.gap-none{text-align:center;padding:12px 0;font-size:14px;color:#34C759;font-weight:500}
.tl-item{display:flex;align-items:flex-start;padding:3px 0;position:relative}
.tl-line{width:2px;height:100%;background:#34C759;margin-right:8px;position:absolute;left:5px;top:12px}
.tl-line.gap{background:#FF9500}
.tl-dot{width:10px;height:10px;border-radius:50%;background:#007AFF;flex-shrink:0;margin-top:3px;z-index:1}
.tl-text{flex:1;margin-left:6px;display:flex;align-items:center;gap:3px}
.tl-date{font-size:11px;color:#3C3C43;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tl-days{font-size:10px;color:#8E8E93;flex-shrink:0;white-space:nowrap;margin-left:auto}
.tl-cum{font-size:10px;color:#007AFF;flex-shrink:0;white-space:nowrap;margin-left:3px}
.summary-box{background:#F0F6FF;border-radius:8px;padding:10px 12px;margin-top:10px}
.sm-row{display:flex;justify-content:space-between;padding:2px 0;font-size:12px}
.sm-row .sm-lbl{color:#636366}
.sm-row .sm-val{font-weight:600;color:#1C1C1E}
.sm-row .sm-val.blue{color:#007AFF}
.sm-row .sm-val.red{color:#FF3B30}
.sm-row .sm-val.green{color:#34C759}
.sm-row .sm-val.orange{color:#FF9500}
.sm-div{height:.5px;background:#E5E5EA;margin:6px 0}
.result-box{margin-top:10px;padding:12px;background:#F2F2F7;border-radius:8px;text-align:center;font-size:13px}
.result-box .num{display:block;font-size:24px;font-weight:700;color:#007AFF;margin:3px 0}
.result-box .sub{display:block;font-size:11px;color:#8E8E93;margin-top:2px}
.hide{display:none!important}
.footer{text-align:center;font-size:11px;color:#C7C7CC;padding:14px 0 4px}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;display:flex;background:rgba(250,250,252,.98);border-top:.5px solid rgba(0,0,0,.1);padding:6px 0 20px;z-index:100;max-width:480px;margin:0 auto}

/* ====== Record Cards ====== */
#recordsList .rec-card{background:#f9f9fb;border-radius:8px;padding:10px 12px;margin-bottom:8px}
#recordsList .rec-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
#recordsList .rec-abbr{font-size:15px;font-weight:700;color:#007AFF;letter-spacing:1px}
#recordsList .rec-actions{display:flex;gap:8px}
#recordsList .rec-btn{font-size:12px;padding:4px 8px;border-radius:6px;cursor:pointer}
#recordsList .rec-btn.edit{color:#007AFF}
#recordsList .rec-btn.del{color:#FF3B30}
#recordsList .rec-body{display:flex;flex-direction:column;gap:2px;margin-bottom:6px}
#recordsList .rec-info{font-size:12px;color:#86868b;line-height:1.4}
#recordsList .rec-foot{display:flex;justify-content:space-between;align-items:center;padding-top:8px;border-top:0.5px solid rgba(0,0,0,.04)}
#recordsList .rec-days{font-size:14px;font-weight:600;color:#1d1d1f}
#recordsList .rec-days.warn{color:#FF3B30}
#recordsList .rec-badge{font-size:14px;color:#FF3B30;background:none;padding:0;border-radius:0}
.save-btn{margin-top:10px}
#recordsList .empty{text-align:center;padding:20px 0 10px;font-size:14px;color:#c7c7cc}
/* ====== Save Dialog ====== */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:200}
.modal-box{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:280px;background:#fff;border-radius:14px;z-index:201;overflow:hidden}
.modal-hd{text-align:center;font-size:16px;font-weight:600;color:#1d1d1f;padding:16px 16px 0}
.modal-body{padding:16px}
.modal-lbl{display:block;font-size:13px;color:#86868b;margin-bottom:6px}
.modal-ipt{display:block;width:100%;height:40px;line-height:40px;padding:0 12px;font-size:20px;font-weight:700;text-align:center;letter-spacing:3px;background:#f5f5f7;border:none;border-radius:10px;outline:none;color:#1d1d1f;text-transform:uppercase;box-sizing:border-box}
.modal-err{display:block;font-size:12px;color:#FF3B30;margin-top:4px;text-align:center}
.modal-btns{display:flex;border-top:0.5px solid rgba(0,0,0,.06)}
.modal-btn{flex:1;text-align:center;padding:14px 0;font-size:15px;cursor:pointer;border:none;background:none}
.modal-btn.cancel{color:#86868b}
.modal-btn.confirm{color:#007AFF;font-weight:600}

@media(prefers-color-scheme:dark){
body{background:#1C1C1E;color:#F5F5F7}
.card,.tabs{background:#2C2C2E;box-shadow:none}
.card-hd{color:#98989D}
.ff-lbl{color:#98989D}
.ff-val{color:#F5F5F7}
.ff-trigger,.ff-ipt{background:#3A3A3C;color:#F5F5F7}
.ff-trigger{color:#0A84FF}
.ff-ipt{color:#F5F5F7}
.ff-hint,.result-box .sub,.rb-label,.rc-row .rc-lbl,.sm-row .sm-lbl,.gap-text,.gap-arrow{color:#98989D}
select.ff-trigger{color:#F5F5F7}
.presc-card{background:#3A3A3C}
.presc-title,.result .rc-title,.sm-row .sm-val,.rc-row .rc-val,.gap-total{color:#F5F5F7}
.presc-body,.gap-total{color:#98989D}
.result{background:#2C2C2E;box-shadow:none;border-left-color:#0A84FF}
.result.warn{background:#3A2E1E;border-left-color:#FF9F0A}
.rc-div,.sm-div{background:#38383A}
.rc-text,.summary-box{background:#3A3A3C}
.gap-badge{background:#4A2020;color:#FF453A}
.gap-none{color:#30D158}
.gap-num{color:#FF453A}
.tl-line{background:#30D158}
.tl-line.gap{background:#FF9F0A}
.tl-dot{background:#0A84FF}
.tl-date{color:#F5F5F7}
.tl-days{color:#98989D}
.tl-cum{color:#0A84FF}
.result-box{background:#3A3A3C}
.result-box .num{color:#0A84FF}
.rc-row .rc-val.blue,.sm-row .sm-val.blue{color:#0A84FF}
.rc-row .rc-val.red{color:#FF453A}
.rc-row .rc-val.green,.sm-row .sm-val.green{color:#30D158}
.rc-row .rc-val.orange,.sm-row .sm-val.orange{color:#FF9F0A}
.empty{color:#48484A}
.btn-row .btn-primary,.ios-btn.primary{background:#0A84FF}
.btn-row .btn-secondary,.ios-btn.secondary{background:#3A3A3C;color:#0A84FF}
.btn-small{background:#3A3A3C;color:#0A84FF}
.btn-add{border-color:#48484A;color:#0A84FF}
.btn-del{color:#FF453A}
.footer{color:#48484A}
.bottom-nav{background:rgba(28,28,30,.98);border-color:#38383A}
.nav-svg{color:#98989D}
.nav-label{color:#98989D}
.nav-item.active .nav-svg{color:#0A84FF}
.nav-item.active .nav-label{color:#0A84FF}
#recordsList .rec-card{background:#3A3A3C}
#recordsList .rec-abbr{color:#0A84FF}
#recordsList .rec-info{color:#98989D}
#recordsList .rec-days{color:#F5F5F7}
#recordsList .rec-days.warn{color:#FF453A}
#recordsList .rec-badge{color:#FF453A}
#recordsList .rec-foot{border-color:#38383A}
#recordsList .empty{color:#48484A}
.modal-box{background:#2C2C2E}
.modal-hd{color:#F5F5F7}
.modal-lbl{color:#98989D}
.modal-ipt{background:#3A3A3C;color:#F5F5F7}
.modal-btn.cancel{color:#98989D}
.modal-btn.confirm{color:#0A84FF}
.modal-btns{border-color:#38383A}
}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:2px 0;cursor:pointer}
.nav-icon{width:24px;height:24px}
.nav-svg{width:24px;height:24px}
.nav-label{font-size:11px;color:#86868b;font-weight:500}
.nav-item.active .nav-label{color:#007AFF}
.nav-item.active .nav-svg{color:#007AFF}
</style>
</head>
<body>

<!-- Tab 0: 处方 -->
<div id="tab0" class="tab-content">

  <div class="card">
    <div class="card-hd">选择药物</div>
    <div class="ff">
      <label class="ff-lbl">分类</label>
      <select class="ff-trigger" id="catSelect" onchange="onCatChange()"><option value="">请选择</option></select>
    </div>
    <div class="ff">
      <label class="ff-lbl">药物</label>
      <select class="ff-trigger" id="drugSelect" onchange="onDrugChange()"><option value="">请先选分类</option></select>
    </div>
    <div class="ff-hint" id="drugNote"></div>
  </div>

  <div class="card hide" id="prescForm">
    <div class="card-hd">处方信息</div>
    <div class="ff">
      <label class="ff-lbl">药品</label>
      <div class="ff-val" id="medName"></div>
    </div>
    <div class="ff">
      <label class="ff-lbl">开药日期</label>
      <input class="ff-trigger" type="date" id="prescDate">
    </div>
    <div class="ff">
      <label class="ff-lbl">每次用量</label>
      <input class="ff-ipt" type="number" id="dosePerTime" placeholder="如 1" min="0" step="any">
    </div>
    <div class="ff">
      <label class="ff-lbl">用药频次</label>
      <select class="ff-trigger" id="freqSelect"></select>
    </div>
    <div class="ff">
      <label class="ff-lbl">开药总量</label>
      <input class="ff-ipt" type="number" id="totalQty" placeholder="如 60" min="0" step="any">
    </div>
  </div>

  <div class="btn-row hide" id="actionBtns">
    <button class="btn btn-primary" type="button" onclick="calcOnce()">计算单次</button>
    <button class="btn btn-secondary" type="button" onclick="resetForm()">清空</button>
  </div>

  <div class="card result hide" id="singleResult">
    <div class="rc-title">计算结果</div>
    <div class="rc-row"><span class="rc-lbl">每天用量</span><span class="rc-val" id="rDailyDose"></span></div>
    <div class="rc-row"><span class="rc-lbl">可服用天数</span><span class="rc-val blue" id="rDaysSupply"></span></div>
    <div class="rc-row"><span class="rc-lbl">预计用完日期</span><span class="rc-val blue" id="rEndDate"></span></div>
    <div class="rc-div"></div>
    <div class="rc-text" id="rText"></div>
  </div>

  <div class="card hide" id="multiSection">
    <div class="card-hd">多次处方列表</div>
    <button class="btn-add" type="button" onclick="addPresc()">+ 添加此处方到列表</button>
    <div class="empty" id="listEmpty">暂无处方记录</div>
    <div id="prescList"></div>
    <div class="btn-row hide" id="gapBtns">
      <button class="btn btn-primary" type="button" onclick="analyze()">分析断药</button>
      <button class="btn btn-secondary" type="button" onclick="clearList()">清空列表</button>
    </div>
  </div>

  <div class="card result warn hide" id="gapResult">
    <div class="rc-title">断药分析</div>
    <div id="gapBody"></div>
  </div>

  <button class="btn btn-primary save-btn" type="button" onclick="showSaveDialog()">保存记录</button>

</div>

<!-- Tab 1: 日期工具 -->
<div id="tab1" class="tab-content hide">
  <div class="card">
    <div class="card-hd">计算日期差</div>
    <div class="ff">
      <label class="ff-lbl">开始日期</label>
      <input class="ff-trigger" type="date" id="d1">
    </div>
    <div class="ff">
      <label class="ff-lbl">结束日期</label>
      <input class="ff-trigger" type="date" id="d2">
    </div>
    <button class="btn btn-primary" type="button" onclick="calcDiff()">计算相差天数</button>
    <div class="result-box hide" id="diffResult">
      <span>相差</span><span class="num" id="diffNum">0</span><span>天</span>
      <span class="sub" id="diffSub"></span>
    </div>
  </div>
  <div class="card">
    <div class="card-hd">推算日期</div>
    <div class="ff">
      <label class="ff-lbl">起始日期</label>
      <input class="ff-trigger" type="date" id="offsetBase">
    </div>
    <div class="ff-row">
      <div class="ff">
        <label class="ff-lbl">数值</label>
        <input class="ff-ipt" type="number" id="offsetVal" placeholder="如 30" min="0" step="any">
      </div>
      <div class="ff">
        <label class="ff-lbl">单位</label>
        <select class="ff-trigger" id="offsetUnit"><option value="天">天</option><option value="周">周</option><option value="月">月</option></select>
      </div>
    </div>
    <div class="ff-row">
      <div class="ff">
        <label class="ff-lbl">方向</label>
        <select class="ff-trigger" id="offsetDir"><option value="1">往后</option><option value="-1">往前</option></select>
      </div>
      <div class="ff">
        <label class="ff-lbl">&nbsp;</label>
        <button class="btn btn-primary" type="button" onclick="calcOffset()">推算</button>
      </div>
    </div>
    <div class="result-box hide" id="offsetResult">
      <span class="num" id="offsetNum"></span>
    </div>
  </div>
</div>

<!-- Tab 2: 保存记录 -->
<div id="tab2" class="tab-content hide">
  <div class="card">
    <div class="card-hd">保存的记录</div>
    <div id="recordsList"></div>
  </div>
</div>

<div class="footer">本工具仅供参考，实际用药请遵医嘱</div>

<div class="bottom-nav">
  <div class="nav-item" data-tab="0" onclick="switchTab(0)">
    <svg viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" class="nav-svg"><rect x="7" y="6" width="8" height="12" rx="2"/><rect x="9" y="3" width="4" height="3" rx=".5"/></svg>
    <span class="nav-label">处方计算</span>
  </div>
  <div class="nav-item" data-tab="1" onclick="switchTab(1)">
    <svg viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" class="nav-svg"><rect x="3" y="5" width="16" height="14" rx="2"/><path d="M7 2v4M15 2v4M3 9h16"/></svg>
    <span class="nav-label">日期工具</span>
  </div>
  <div class="nav-item" data-tab="2" onclick="switchTab(2)">
    <svg viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" class="nav-svg"><line x1="4" y1="6" x2="18" y2="6"/><line x1="4" y1="11" x2="18" y2="11"/><line x1="4" y1="16" x2="18" y2="16"/></svg>
    <span class="nav-label">记录</span>
  </div>
</div>

<div class="modal-overlay hide" id="saveOverlay" onclick="cancelSave()"></div>
<div class="modal-box hide" id="saveDialog">
  <div class="modal-hd" id="saveDialogTitle">保存记录</div>
  <div class="modal-body">
    <label class="modal-lbl">输入缩写（4位字母）</label>
    <input class="modal-ipt" id="saveAbbrInput" maxlength="4" placeholder="如 MTX1" oninput="onSaveAbbrInput(this)" autofocus/>
    <span class="modal-err hide" id="saveAbbrError"></span>
  </div>
  <div class="modal-btns">
    <button class="modal-btn cancel" type="button" onclick="cancelSave()">取消</button>
    <button class="modal-btn confirm" type="button" onclick="confirmSave()">确认</button>
  </div>
</div>

<script>
// ==== Data ====
const drugDB = {
  '甲氨蝶呤':{cat:'csDMARDs',spec:'2.5mg',unit:'片',freq:'QW',dose:'4',note:'常用剂量 7.5-15mg/周（3-6片/周），每周固定一天服用'},
  '来氟米特':{cat:'csDMARDs',spec:'10mg',unit:'片',freq:'QD',dose:'1',note:'常用剂量 10-20mg/日（1-2片/日）'},
  '羟氯喹':{cat:'csDMARDs',spec:'0.1g',unit:'片',freq:'QD',dose:'2',note:'常用剂量 0.2-0.4g/日（2-4片/日）'},
  '艾拉莫德':{cat:'csDMARDs',spec:'25mg',unit:'片',freq:'BID',dose:'1',note:'常用剂量 25mg/次 BID（1片/次，每日2次）'},
  '柳氮磺胺嘧啶':{cat:'csDMARDs',spec:'0.25g',unit:'片',freq:'BID',dose:'2',note:'常用剂量 0.5-0.75g/次 BID/TID（2-3片/次），建议饭后服用'},
  '托法替布':{cat:'tsDMARDs',spec:'5mg',unit:'片',freq:'BID',dose:'1',note:'常用剂量 5mg/次 BID（每日2次，每次1片）'},

]
const freqTimes={QD:1,BID:2,TID:3,QW:1/7,BIW:2/7,Q2W:1/14,QOD:.5,QM:1/30,Q8W:1/56,Q6M:1/182.5}

function calcPillsNeeded(targetRemain,freqVal,dosePerTime,dailyDose){
  const bd=batchDays(freqVal)
  if(bd){const pb=batchPills(freqVal,+dosePerTime)||+dosePerTime;return Math.ceil(targetRemain/bd)*pb}
  return Math.ceil(dailyDose*targetRemain)
}

// ==== Date utils ====
function parseDate(s){if(!s)return new Date();const p=s.split('-');return new Date(+p[0],+p[1]-1,+p[2])}
function fmtDate(d){const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0');return y+'-'+m+'-'+dd}
function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r}
function diffDays(a,b){const t1=new Date(a.getFullYear(),a.getMonth(),a.getDate()),t2=new Date(b.getFullYear(),b.getMonth(),b.getDate());return Math.round((t2-t1)/864e5)}
function todayStr(){return fmtDate(new Date())}

// ==== Supply calc ====
function batchDays(f){return{QW:7,BIW:7,Q2W:14,QM:30,Q8W:56,Q6M:182.5}[f]||0}
function batchPills(f,d){return f==='QW'?+d:f==='BIW'?+d*2:0}
function calcSupply(qty,dose,freq){
  const bd=batchDays(freq)
  if(bd){const pb=batchPills(freq,dose)||+dose;const fb=Math.floor(+qty/pb);return{ds:fb*bd,dd:pb/bd}}
  const dd=+dose*freqTimes[freq];return{ds:Math.floor(+qty/dd),dd}
}

  const dose=+d.dose,qty=+d.qty;if(isNaN(dose)||isNaN(qty)||dose<=0||qty<=0){alert('用量请输入有效数字');return}
  const {ds,dd}=calcSupply(qty,d.dose,d.freq)
  if(ds<=0){alert('药量不足以服用1天');return}
  const start=parseDate(d.date||todayStr()),end=addDays(start,ds-1),es=fmtDate(end)
  let txt=dd.toFixed(2)+d.unit
  const info=drugDB[d.medName]
  if(info){const s=info.spec; const m=s.match(/([\d.]+)mg/),g=s.match(/([\d.]+)g/);if(m)txt+=`（${(dd*+m[1]).toFixed(1)}mg）`;else if(g)txt+=`（${(dd*+g[1]*1000).toFixed(0)}mg）`}
  const rText=`💊 ${d.medName}\n📋 用法：${d.dose}${d.unit}/次 ${freqOpts.find(f=>f.val===d.freq)?.label||d.freq}\n📦 总量：${d.qty}${d.unit}\n📅 开药：${d.date||todayStr()}\n━━━━\n📌 每天：${txt}\n📌 可服：${ds}天\n📌 用完：${es}`

// ==== Analyze gaps ====
function analyze(){
  const list=state.prescList
  if(list.length<2){alert('请至少添加 2 次处方');return}
  const sorted=[...list].sort((a,b)=>a.prescDate.localeCompare(b.prescDate))
  let pills=+sorted[0].totalQty,dose=sorted[0].dailyDose,last=parseDate(sorted[0].prescDate)
  const gaps=[],entries=[]
  let totalGap=0
  const fe=addDays(last,Math.floor(pills/dose)-1)
  entries.push({...sorted[0],cumEnd:fmtDate(fe),hasGapBefore:false,showCum:fmtDate(fe)!==sorted[0].endDate})
  for(let i=1;i<sorted.length;i++){
    const p=sorted[i],cd=parseDate(p.prescDate),elapsed=diffDays(last,cd),need=elapsed*dose
    let hasGap=false
    if(need>pills){
      const short=need-pills,gap=Math.ceil(short/dose)
      totalGap+=gap
      const ro=addDays(last,Math.floor(pills/dose)-1)
      gaps.push({index:i,fromDate:fmtDate(ro),toDate:p.prescDate,gapDays:gap,fromLabel:'药吃完（'+fmtDate(ro)+'）',toLabel:'下次开药（'+p.prescDate+'）'})
      pills=0;hasGap=true
    }else{pills-=need}
    pills+=+p.totalQty;dose=p.dailyDose;last=cd
    const ce=addDays(last,Math.floor(pills/dose)-1),ces=fmtDate(ce)
    entries.push({...p,cumEnd:ces,hasGapBefore:hasGap,showCum:ces!==p.endDate})
  }
  const finalDate=entries[entries.length-1].cumEnd,finalEnd=parseDate(finalDate)
  const continuousStart=entries.reduce((s,e)=>e.hasGapBefore?e.prescDate:s,entries[0].prescDate)
  const contDays=Math.max(0,diffDays(parseDate(continuousStart),new Date()))
  const contM=Math.floor(contDays/30),contD=contDays%30
  const target=90,tRemain=Math.max(0,target-contDays),contMet=contDays>=target
  const latest = sorted[sorted.length - 1]
  const pillsNeeded = contMet ? 0 : calcPillsNeeded(tRemain, latest.freqVal, latest.dosePerTime, latest.dailyDose)
  document.getElementById('pillsNeededText').textContent = pillsNeeded + (latest.unit || '粒')
  document.getElementById('pillsNeededRow').classList.toggle('hide', contMet)
  const suggestDate=addDays(finalEnd,-7),suggestStr=fmtDate(suggestDate)
  const remainDays=diffDays(new Date(),finalEnd),urgent=suggestStr<=todayStr()
  const gapSet=new Set(gaps.map(g=>g.index))

  let html='<span style="font-size:12px;color:#636366">共 '+list.length+' 次处方</span>'
  if(!gaps.length)html+='<div class="gap-none">✅ 连续用药，无断药</div>'
  else{
    html+=gaps.map(g=>`<div class="gap-item"><span class="gap-badge">${g.gapDays}天断药</span><span class="gap-text">${g.fromLabel}</span><span class="gap-arrow">→</span><span class="gap-text">${g.toLabel}</span></div>`).join('')
    html+=`<div class="gap-total">累计断药：<span class="num">${totalGap} 天</span></div>`
  }
  html+='<div class="gap-timeline">'+entries.map((e,i)=>`<div class="tl-item"><div class="tl-line${e.hasGapBefore?' gap':''}"></div><div class="tl-dot"></div><div class="tl-text"><div class="tl-date">第${i+1}次：${e.prescDate} → ${e.endDate}</div><span class="tl-days">${e.daysSupply}天</span>${e.showCum?'<span class="tl-cum">累计可到 '+e.cumEnd+'</span>':''}</div></div>`).join('')+'</div>'
  html+='<div class="summary-box">'
  html+=`<div class="sm-row"><span class="sm-lbl">连续未断药（至今）</span><span class="sm-val blue">${contM}月${contD}天</span></div>`
  html+=`<div class="sm-row"><span class="sm-lbl">项目要求（3个月）</span><span class="sm-val ${contMet?'green':'orange'}">${contMet?'✅ 已达标':'还差 '+tRemain+' 天'}</span></div>`
  html+=`<div class="sm-div"></div>`
  html+=`<div class="sm-row"><span class="sm-lbl">全部药可吃到</span><span class="sm-val">${finalDate}</span></div>`
  html+=`<div class="sm-row"><span class="sm-lbl">距离今天</span><span class="sm-val ${remainDays>=0?'blue':'red'}">${remainDays>=0?'还剩 '+remainDays+' 天':'已断药 '+(-remainDays)+' 天'}</span></div>`
  html+=`<div class="sm-row ${contMet?'hide':''}" id="pillsNeededRow"><span class="sm-lbl">还需购买药物</span><span class="sm-val orange" id="pillsNeededText">${pillsNeeded}${latest.unit||'粒'}</span></div>`
  html+=`<div class="sm-row"><span class="sm-lbl">建议购药时间</span><span class="sm-val ${urgent?'red':'orange'}">${suggestStr}${urgent?' ⚠️ 已过期':''} 前</span></div>`
  html+='</div>'
  document.getElementById('gapBody').innerHTML=html
  document.getElementById('gapResult').classList.remove('hide')
}

// ==== Records ====
const STORAGE_KEY = 'calc_records'
let editRecordId = null

function loadRecords() {
  const raw = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]')
  const list = raw.map(r => {
    const det = calcRecordDays(r.prescList)
    return { ...r, ...det, saveDateStr: fmtDate(new Date(r.lastSaved)) }
  })
  list.sort((a, b) => b.lastSaved - a.lastSaved)
  renderRecords(list)
}

function calcRecordDays(prescList) {
  if (!prescList || prescList.length === 0) return { remainingDays: -1 }
  const sorted = [...prescList].sort((a, b) => a.prescDate.localeCompare(b.prescDate))
  let p = +sorted[0].totalQty, d = sorted[0].dailyDose, l = parseDate(sorted[0].prescDate)
  const entries = []
  const firstCumEndStr = fmtDate(addDays(l, Math.floor(p / d) - 1))
  entries.push({ prescDate: sorted[0].prescDate, cumEnd: firstCumEndStr, hasGapBefore: false })
  for (let i = 1; i < sorted.length; i++) {
    const c = parseDate(sorted[i].prescDate), e = diffDays(l, c), n = e * d
    let hasGap = false
    if (n > p) { p = 0; hasGap = true } else { p -= n }
    p += +sorted[i].totalQty; d = sorted[i].dailyDose; l = c
    const ce = fmtDate(addDays(l, Math.floor(p / d) - 1))
    entries.push({ prescDate: sorted[i].prescDate, cumEnd: ce, hasGapBefore: hasGap })
  }
  const finalDate = entries[entries.length - 1].cumEnd
  const finalEnd = parseDate(finalDate)
  const remainingDays = Math.max(0, diffDays(new Date(), finalEnd))
  let contStart = entries[0].prescDate
  for (const e of entries) { if (e.hasGapBefore) contStart = e.prescDate }
  const contTotalDays = Math.max(0, diffDays(parseDate(contStart), new Date()))
  const target = 90
  const targetRemain = Math.max(0, target - contTotalDays)
  const contMet = contTotalDays >= target
  const pillsNeeded = contMet ? 0 : calcPillsNeeded(targetRemain, sorted[sorted.length-1].freqVal, sorted[sorted.length-1].dosePerTime, d)
  return { remainingDays, endDate: finalDate, contDays: contTotalDays, contMet, targetRemain, pillsNeeded, unit: sorted[sorted.length - 1]?.unit || '粒' }
}

// ==== Date tools ====
function calcDiff(){
  const d1=document.getElementById('d1').value,d2=document.getElementById('d2').value
  if(!d1||!d2){alert('请选择两个日期');return}
  const diff=diffDays(parseDate(d1),parseDate(d2))
  const [a,b]=diff<0?[d2,d1]:[d1,d2]
  document.getElementById('diffNum').textContent=diff<0?-diff:diff
  document.getElementById('diffSub').textContent=`${a} → ${b}`
  document.getElementById('diffResult').classList.remove('hide')
}
function calcOffset(){
  const base=document.getElementById('offsetBase').value,val=+document.getElementById('offsetVal').value,unit=document.getElementById('offsetUnit').value,dir=+document.getElementById('offsetDir').value
  if(!base||!val){alert('请填写完整');return}
  const d=parseDate(base)
  if(unit==='月'){
    d.setMonth(d.getMonth()+dir*val)
  } else {
    d.setDate(d.getDate()+dir*val*(unit==='周'?7:1))
  }
  document.getElementById('offsetNum').textContent=fmtDate(d)
  document.getElementById('offsetResult').classList.remove('hide')
}
</script>
